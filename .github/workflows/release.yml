name: Release

# Triggered by pushing a version tag: git tag v0.3.0 && git push origin v0.3.0
on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub releases
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build binaries
        run: |
          VERSION_NUM="${{ github.ref_name }}"
          VERSION_NUM="${VERSION_NUM#v}"
          dotnet publish src/DnsSync -c Release -r osx-arm64 --self-contained \
            -p:PublishSingleFile=true -p:Version="${VERSION_NUM}" -o out/osx-arm64
          dotnet publish src/DnsSync -c Release -r osx-x64 --self-contained \
            -p:PublishSingleFile=true -p:Version="${VERSION_NUM}" -o out/osx-x64
          dotnet publish src/DnsSync -c Release -r linux-x64 --self-contained \
            -p:PublishSingleFile=true -p:Version="${VERSION_NUM}" -o out/linux-x64
          cp out/osx-arm64/dns-sync out/dns-sync-darwin-arm64
          cp out/osx-x64/dns-sync  out/dns-sync-darwin-x64
          cp out/linux-x64/dns-sync out/dns-sync-linux-x64

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            out/dns-sync-darwin-arm64 \
            out/dns-sync-darwin-x64 \
            out/dns-sync-linux-x64 \
            --title "${{ github.ref_name }}" \
            --generate-notes

      - name: Update Homebrew tap
        # Requires a PAT with repo scope stored as secret HOMEBREW_TAP_TOKEN
        # Create at: https://github.com/settings/tokens/new?scopes=repo
        # Add at:    https://github.com/cl8dep/dns-sync/settings/secrets/actions
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          export VERSION_NUM="${VERSION#v}"
          export SHA_ARM64=$(sha256sum out/dns-sync-darwin-arm64 | awk '{print $1}')
          export SHA_X64=$(sha256sum out/dns-sync-darwin-x64 | awk '{print $1}')

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/cl8dep/homebrew-tap.git"

          python3 .github/scripts/update-tap.py homebrew-tap/Formula/dns-sync.rb

          cd homebrew-tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/dns-sync.rb
          git diff --staged --quiet || git commit -m "Update dns-sync to ${VERSION}"
          git push
