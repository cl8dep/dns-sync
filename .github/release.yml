changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: New Features
      labels:
        - enhancement
        - feature
    - title: Bug Fixes
      labels:
        - bug
        - fix
    - title: Providers
      labels:
        - provider
    - title: CI/CD & Tooling
      labels:
        - ci
        - tooling
        - release
    - title: Documentation
      labels:
        - documentation
    - title: Other Changes
      labels:
        - "*"
